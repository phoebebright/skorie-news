{% extends "admin/administrator_base.html" %}
{% load bootstrap5 %}

{% block page_header %}Add Newsletter{% endblock %}
{% block content %}



  <form method="post" novalidate>
    {% csrf_token %}
    {% bootstrap_form form %}
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{{ next }}" class="btn btn-secondary">Cancel</a>
  </form>


{% endblock %}
