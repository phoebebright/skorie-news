{# templates/news/public/unsubscribe_confirmed.html #}
{% extends "base.html" %}
{% block page_header %}You’re unsubscribed{% endblock %}
{% block content %}
  <div class="alert alert-success">
    You have been unsubscribed from <strong>{{ subscription.newsletter.title }}</strong>.
  </div>
  <p>
    Changed your mind?
    <a href="{% url 'news:manage-subs' %}" class="btn btn-outline-primary btn-sm">Manage subscriptions</a>
  </p>
{% endblock %}
